name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Download models
      run: python download_models.py
    
    - name: Run linter
      run: |
        pip install flake8 black
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        black --check .
    
    - name: Run tests
      run: pytest --cov=. --cov-report=xml
    
    - name: Test model inference
      run: |
        python -c "from embedding.vit_encoder import load_model; model = load_model(); print('Model loaded successfully')"
    
    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml

  benchmark:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
    - uses: actions/checkout@v4
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Run benchmark
      run: |
        pip install -r requirements.txt
        python benchmark.py --quick

  deploy-staging:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    
    steps:
    - uses: actions/checkout@v4
    - name: Build Docker image
      run: docker build -t archaeofinder-ml:staging .
    - name: Deploy to Staging
      run: echo "Deploying ML service to staging..."

  deploy-production:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    - name: Build Docker image
      run: docker build -t archaeofinder-ml:latest .
    - name: Deploy to Production
      run: echo "Deploying ML service to production..."
